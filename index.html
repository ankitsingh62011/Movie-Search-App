<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Animated Movie Search App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🎬 Movie Search</h1>

        <div class="search-box">
    <input type="text" id="movieInput" placeholder="Search movie..." onkeyup="showSuggestions()">
    <button onclick="searchMovie()">Search</button>

    <div id="suggestions" class="suggestions-box"></div>
</div>


        <div id="movieContainer" class="movie-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
